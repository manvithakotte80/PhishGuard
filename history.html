<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PhishGuard History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1>PhishGuard</h1>
        <nav>
            <a href="/">Home</a> | 
            <a href="/history">History</a> | 
            <a href="/clear-history">Clear History</a>
        </nav>
    </header>

    <main>
        <section class="history-section">
            {% if data %}
            <table>
                <tr>
                    <th>Date & Time</th>
                    <th>URL</th>
                    <th>Result</th>
                    <th>Risk</th>
                </tr>
                {% for row in data %}
                <tr>
                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[2] }}</td>
                    <td>{{ row[3] }}</td>
                </tr>
                {% endfor %}
            </table>
            {% else %}
            <p>No history yet.</p>
            {% endif %}
        </section>
    </main>
</body>
</html>
